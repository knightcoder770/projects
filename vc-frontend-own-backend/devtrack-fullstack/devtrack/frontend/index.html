<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevTrack</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
</head>
<body>

  <div id="scanlines"></div>

  <div id="app">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="logo">
        <span class="logo-hex">⬡</span>
        <span class="logo-text">DEV<span class="accent">TRACK</span></span>
        <span class="version">v0.1</span>
      </div>

      <div class="streak-badge" id="sidebar-streak">
        <span class="fire">🔥</span>
        <div>
          <div class="streak-num" id="streak-val">—</div>
          <div class="streak-lbl">day streak</div>
        </div>
      </div>

      <nav>
        <a class="nav-link active" data-page="dashboard"  onclick="go('dashboard')"><span>◈</span>Dashboard</a>
        <a class="nav-link"        data-page="log"        onclick="go('log')"><span>◉</span>Log Session</a>
        <a class="nav-link"        data-page="projects"   onclick="go('projects')"><span>◧</span>Projects</a>
        <a class="nav-link"        data-page="goals"      onclick="go('goals')"><span>◎</span>Goals</a>
        <a class="nav-link"        data-page="skills"     onclick="go('skills')"><span>◬</span>Skills</a>
        <a class="nav-link"        data-page="github"     onclick="go('github')"><span>⬡</span>GitHub</a>
        <a class="nav-link"        data-page="report"     onclick="go('report')"><span>◫</span>Weekly Report</a>
      </nav>

      <div class="sidebar-footer">
        <div class="backend-status" id="backend-status">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">connecting...</span>
        </div>
      </div>
    </aside>

    <!-- PAGES -->
    <main id="main">
      <div id="pg-dashboard" class="page active"></div>
      <div id="pg-log"       class="page"></div>
      <div id="pg-projects"  class="page"></div>
      <div id="pg-goals"     class="page"></div>
      <div id="pg-skills"    class="page"></div>
      <div id="pg-github"    class="page"></div>
      <div id="pg-report"    class="page"></div>
    </main>

  </div>

  <!-- MODAL -->
  <div id="overlay" onclick="closeModal()">
    <div id="modal" onclick="event.stopPropagation()">
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/log.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/skills.js"></script>
  <script src="js/github.js"></script>
  <script src="js/report.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
